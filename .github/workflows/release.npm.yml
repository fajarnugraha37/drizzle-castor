name: Release to NPM

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: # Keep manual as backup

permissions:
  contents: read
  id-token: write # Required for NPM provenance and OIDC

jobs:
  publish:
    name: NPM Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org/'

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build project
        run: bunx tsc --noEmit && bun run build

      - name: Publish to NPM
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
