name: Release to JSR

on:
  push:
    tags:
      - 'v*' # Triggered when a new version tag is pushed (e.g. by Changesets)

jobs:
  publish:
    name: JSR Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for JSR OIDC
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Sync version to jsr.json
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Syncing jsr.json to version $VERSION"
          node -e "const fs = require('fs'); const jsr = JSON.parse(fs.readFileSync('./jsr.json', 'utf8')); jsr.version = '$VERSION'; fs.writeFileSync('./jsr.json', JSON.stringify(jsr, null, 2) + '\n');"

      - name: Publish to JSR
        run: bunx jsr publish
