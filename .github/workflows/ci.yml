name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Type Check
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build

      - name: Run Unit Tests
        run: bun test --isolate --exit

      - name: Run SQLite Integration Tests
        run: bun test tests/integration/sqlite --exit

      - name: Run PostgreSQL Integration Tests
        run: node --import tsx --test tests/integration/postgresql/*.test.ts

      - name: Run MySQL Integration Tests
        run: node --import tsx --test tests/integration/mysql/*.test.ts
