name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: test_db
          MYSQL_ROOT_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Type Check
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build

      - name: Run Unit Tests
        run: bun test tests/unit

      - name: Run SQLite Integration Tests
        run: bun test tests/integration/sqlite

      - name: Run PostgreSQL Integration Tests
        env:
          DATABASE_URL: postgres://user:password@localhost:5432/test_db
        run: node --import tsx --test tests/integration/postgresql/*.test.ts

      - name: Run MySQL Integration Tests
        env:
          DATABASE_URL: mysql://root:password@localhost:3306/test_db
        run: node --import tsx --test tests/integration/mysql/*.test.ts
